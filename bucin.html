<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(219, 68, 85, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            transition: all 0.3s ease;
        }
        .heart {
            font-size: 60px;
            animation: pulse 1.2s infinite;
            display: inline-block;
            margin-bottom: 10px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #594d5b;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #btn-yes {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
        #btn-yes:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }
        #btn-no {
            background-color: #ccc;
            color: #333;
            position: absolute;
            left: 55%;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div class="heart">❤️</div>
        <h1 id="title">Halo Cantik/Ganteng... ✨</h1>
        <p id="text">Hari ini aku cuma mau nanya satu hal penting... Kamu mau gak jadi alasan aku semangat setiap hari? alias, mau gak nemenin aku terus? 🥺👉👈</p>
        
        <div class="btn-group">
            <button id="btn-yes" onclick="kamuMau()">Mau!</button>
            <button id="btn-no" onmouseover="hindari()" onclick="hindari()">Enggak</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const title = document.getElementById('title');
        const text = document.getElementById('text');
        const heart = document.querySelector('.heart');
        const btnYes = document.getElementById('btn-yes');

        // Fungsi biar tombol "Enggak" kabur pas didekati/diklik
        function hindari() {
            // Menghitung batas aman agar tombol tidak keluar dari layar browser
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 50);
            
            // Mengubah posisi tombol jadi absolute terhadap layar browser
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        // Fungsi saat tombol "Mau!" diklik
        function kamuMau() {
            title.innerHTML = "Yeayyy! I Love You! 💖";
            text.innerHTML = "Keputusan yang sangat tepat! Makasih ya udah mau bikin hari-hariku jadi lebih berwarna. Nanti kita jalan/call ya! 🥰✨";
            
            // Sembunyikan tombol "Enggak" dan perbesar tombol "Mau!"
            btnNo.style.display = 'none';
            btnYes.style.display = 'none';
            heart.innerHTML = "💖👩‍❤️‍👨💖";
        }
    </script>

</body>
</html>
