<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter Mata Uang Akurat Real-Time</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .converter-box {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            color: var(--text-color);
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .swap-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .swap-btn {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--primary-color);
            padding: 10px 14px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .swap-btn:hover {
            background-color: var(--primary-color);
            color: #fff;
            transform: rotate(180deg);
        }

        .result-box {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-top: 25px;
        }

        .result-amount {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 5px 0;
        }

        .update-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 15px;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="converter-box" id="converterContainer">
        <h2>💱 Konverter Kurs Akurat</h2>
        
        <!-- INPUT JUMLAH UANG -->
        <div class="form-group">
            <label for="amount">Jumlah Uang</label>
            <input type="number" id="amount" value="1" min="0" placeholder="Masukkan jumlah...">
        </div>

        <!-- MATA UANG ASAL -->
        <div class="form-group">
            <label for="fromCurrency">Dari Mata Uang</label>
            <select id="fromCurrency">
                <option value="USD" selected>USD - United States Dollar</option>
                <option value="IDR">IDR - Indonesian Rupiah</option>
                <option value="EUR">EUR - Euro</option>
                <option value="JPY">JPY - Japanese Yen</option>
                <option value="GBP">GBP - British Pound</option>
                <option value="AUD">AUD - Australian Dollar</option>
                <option value="SGD">SGD - Singapore Dollar</option>
                <option value="MYR">MYR - Malaysian Ringgit</option>
                <option value="SAR">SAR - Saudi Arabian Riyal</option>
                <option value="KRW">KRW - South Korean Won</option>
                <option value="CNY">CNY - Chinese Yuan</option>
            </select>
        </div>

        <!-- TOMBOL TUKAR (SWAP) -->
        <div class="swap-container">
            <button class="swap-btn" id="swapBtn" title="Tukar Posisi">⇄</button>
        </div>

        <!-- MATA UANG TUJUAN -->
        <div class="form-group">
            <label for="toCurrency">Ke Mata Uang</label>
            <select id="toCurrency">
                <option value="USD">USD - United States Dollar</option>
                <option value="IDR" selected>IDR - Indonesian Rupiah</option>
                <option value="EUR">EUR - Euro</option>
                <option value="JPY">JPY - Japanese Yen</option>
                <option value="GBP">GBP - British Pound</option>
                <option value="AUD">AUD - Australian Dollar</option>
                <option value="SGD">SGD - Singapore Dollar</option>
                <option value="MYR">MYR - Malaysian Ringgit</option>
                <option value="SAR">SAR - Saudi Arabian Riyal</option>
                <option value="KRW">KRW - South Korean Won</option>
                <option value="CNY">CNY - Chinese Yuan</option>
            </select>
        </div>

        <!-- TAMPILAN HASIL -->
        <div class="result-box">
            <div id="resultText" style="font-size: 0.9rem; color: var(--text-muted);">Menghitung...</div>
            <div class="result-amount" id="resultAmount">Rp 0</div>
        </div>

        <!-- KETERANGAN WAKTU UPDATE -->
        <div class="update-status" id="updateStatus">Memuat data kurs terbaru...</div>
    </div>

    <!-- LOGIKA MENGAMBIL DATA KURS DARI API -->
    <script>
        const amountInput = document.getElementById('amount');
        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        const swapBtn = document.getElementById('swapBtn');
        const resultText = document.getElementById('resultText');
        const resultAmount = document.getElementById('resultAmount');
        const updateStatus = document.getElementById('updateStatus');
        const container = document.getElementById('converterContainer');

        // Menggunakan API publik gratis tanpa perlu ribet mendaftar key khusus
        const API_URL = "https://open.er-api.com/v6/latest/";

        let cachedRates = {};

        // Fungsi utama untuk mengambil data kurs terkini
        async function fetchRates(baseCurrency) {
            container.classList.add('loading');
            try {
                const response = await fetch(`${API_URL}${baseCurrency}`);
                if (!response.ok) throw new Error("Gagal mengambil data dari server.");
                
                const data = await response.json();
                cachedRates[baseCurrency] = data.rates;
                
                // Format waktu pembaruan terakhir
                const date = new Date(data.time_last_update_utc);
                updateStatus.innerText = `Kurs Akurat Per: ${date.toLocaleString('id-ID')} WIB`;
                
                calculateConversion();
            } catch (error) {
                resultText.innerText = "Error";
                resultAmount.innerText = "Koneksi Gagal";
                updateStatus.innerText = "Gagal memperbarui kurs. Periksa internet Anda.";
                console.error(error);
            } finally {
                container.classList.remove('loading');
            }
        }

        // Fungsi untuk menghitung hasil konversi uang
        function calculateConversion() {
            const amount = parseFloat(amountInput.value);
            const from = fromSelect.value;
            const to = toSelect.value;

            if (isNaN(amount) || amount <= 0) {
                resultText.innerText = "-";
                resultAmount.innerText = "0";
                return;
            }

            // Jika data mata uang asal sudah ada di memori
            if (cachedRates[from]) {
                const rate = cachedRates[from][to];
                const total = amount * rate;
                
                resultText.innerText = `${amount.toLocaleString()} ${from} sama dengan`;
                resultAmount.innerText = `${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${to}`;
            } else {
                fetchRates(from);
            }
        }

        // Event Listener ketika input atau pilihan diubah
        amountInput.addEventListener('input', calculateConversion);
        toSelect.addEventListener('change', calculateConversion);
        
        // Jika mata uang asal diubah, kita harus ambil data API baru untuk base tersebut
        fromSelect.addEventListener('change', () => {
            fetchRates(fromSelect.value);
        });

        // Fitur tombol tukar posisi mata uang (Swap)
        swapBtn.addEventListener('click', () => {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            fetchRates(fromSelect.value);
        });

        // Ambil data pertama kali saat halaman dibuka (Default USD)
        fetchRates('USD');
    </script>
</body>
</html>
