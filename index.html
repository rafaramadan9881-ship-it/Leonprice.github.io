<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat Terus ya! ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff6b6b;
            font-size: 24px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }
        .btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Kamu bisa ganti emoji di bawah ini -->
        <div style="font-size: 50px;">🚀</div>
        <h1>Hei Kamu, Jangan Menyerah!</h1>
        <p>Gak apa-apa kalau hari ini terasa berat atau capek. Istirahat sebentar, terus jalan lagi ya. Kamu itu jauh lebih kuat dari yang kamu bayangkan! 💪✨</p>
        
        <!-- Tombol interaktif pakai JavaScript simpel -->
        <button class="btn" onclick="tampilkanPesan()">Klik kalau butuh booster!</button>
    </div>

    <script>
        function tampilkanPesan() {
            alert("Ingat: Kamu berharga, kamu hebat, dan kamu pasti bisa ngelewatin ini semua! Proud of you! ⭐");
        }
    </script>

</body>
  </html>
