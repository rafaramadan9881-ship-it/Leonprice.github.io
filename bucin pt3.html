<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hati 3D Pink ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffe5ec; /* Background pink pastel lembut */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #ff4d6d;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
            pointer-events: none; /* Biar gak ganggu klik mouse ke 3D */
        }
    </style>
    <!-- Memanggil Library Three.js untuk rendering 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="title">I Love U 💖</div>
    <div id="canvas-container"></div>

    <script>
        // 1. Setup Scene, Kamera, dan Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 2. Membuat Pencahayaan (Lighting) agar efek 3D terlihat nyata
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(10, 15, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffb3c6, 0.5); // Cahaya sekunder pink
        dirLight2.position.set(-10, -15, -10);
        scene.add(dirLight2);

        // 3. Membuat Geometri Hati 3D Menggunakan Rumus Matematika (Mesh)
        const heartShape = new THREE.Shape();
        
        // Menggambar kurva hati 2D dasar
        const x = 0, y = 0;
        heartShape.moveTo(x + 2.5, y + 2.5);
        heartShape.bezierCurveTo(x + 2.5, y + 2.5, x + 2, y, x, y);
        heartShape.bezierCurveTo(x - 3, y, x - 3, y + 3.5, x - 3, y + 3.5);
        heartShape.bezierCurveTo(x - 3, y + 5.5, x - 1.5, y + 7.7, x + 2.5, y + 9.5);
        heartShape.bezierCurveTo(x + 6, y + 7.7, x + 8, y + 5.5, x + 8, y + 3.5);
        heartShape.bezierCurveTo(x + 8, y + 3.5, x + 8, y, x + 5, y);
        heartShape.bezierCurveTo(x + 3.5, y, x + 2.5, y + 2.5, x + 2.5, y + 2.5);

        // Ekstrusi (Extrude) bentuk 2D menjadi 3D tebal
        const extrudeSettings = {
            depth: 2,
            bevelEnabled: true,
            bevelSegments: 5,
            steps: 2,
            bevelSize: 0.5,
            bevelThickness: 0.5
        };

        const geometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
        
        // Menggeser poros rotasi ke tengah-tengah objek hati
        geometry.center();

        // 4. Material Objek (Warna Pink, Berkilau/Glossy)
        const material = new THREE.MeshStandardMaterial({
            color: 0xff4d6d,          // Warna pink cerah
            roughness: 0.2,           // Tingkat kekasaran permukaan
            metalness: 0.1,           // Efek pantulan metalik sedikit
            clearcoat: 1.0,           // Lapisan kilap tambahan di atas material
            clearcoatRoughness: 0.1
        });

        const heartMesh = new THREE.Mesh(geometry, material);
        
        // Membalik posisi hati agar tidak terbalik (karena koordinat Three.js)
        heartMesh.rotation.z = Math.PI;
        scene.add(heartMesh);

        // 5. Animasi Loop (Biar Hatinya Berputar dan Berdenyut)
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Rotasi otomatis
            heartMesh.rotation.y = elapsedTime * 0.8;
            
            // Efek berdenyut (pulse) skala naik turun tipis-tipis pakai rumus Sinus
            const pulse = 1 + Math.sin(elapsedTime * 3) * 0.05;
            heartMesh.scale.set(pulse, pulse, pulse);

            renderer.render(scene, camera);
        }

        animate();

        // 6. Handling Responsif Layar jika Browser di-resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
